spring:
  application:
    name: delivery-platform-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: localhost
      port: 6379

  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpiration: ${JWT_ACCESS_EXPIRATION}
    refreshTokenExpiration: ${JWT_REFRESH_EXPIRATION}


cors:
    allowed-origin: ${ALLOWED_ORIGINS:*}