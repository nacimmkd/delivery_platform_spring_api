spring:
  application:
    name: delivery-platform-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: ${MAIL_HOST}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    port: ${MAIL_PORT}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  access-token-duration: ${JWT_ACCESS_DURATION}
  refresh-token-duration: ${JWT_REFRESH_DURATION}

aws:
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
  region: ${AWS_REGION}
  s3:
    bucket-name: ${AWS_BUCKET_NAME}
    presign-duration : 5m
    read-duration : 5m

geocoding:
  nominatim:
    base-url: ${NOMINATIM_BASE_URL}
    user-agent: ${NOMINATIM_USER_AGENT}

cors:
    allowed-origins:
      - http://localhost:3000

app:
  mail:
    from: ${MAIL_FROM}