stages:
  - init
  - build
  - package

init:
  stage: init
  image: alpine:latest
  script:
    - echo "starting ci pipeline"

build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn clean compile

package:
  stage: package
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn clean package -DskipTests