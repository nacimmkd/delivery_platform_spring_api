services:
  postgres:
    image: postgres:16
    container_name: delivery-db-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: .
    container_name: delivery-backend
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data: